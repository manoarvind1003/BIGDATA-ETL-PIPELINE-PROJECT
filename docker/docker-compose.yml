# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  pipeline_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

# =============================================================================
# Services
# =============================================================================
services:

  # ─────────────────────────── Zookeeper ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: food_delivery_zookeeper
    hostname: zookeeper
    restart: unless-stopped
    networks:
      - pipeline_net
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    

  # ─────────────────────────── Kafka Broker ───────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: food_delivery_kafka
    hostname: kafka
    restart: unless-stopped

    depends_on:
      - zookeeper

    networks:
      - pipeline_net

    ports:
      - "9092:9092"
      - "9093:9093"

    volumes:
      - kafka_data:/var/lib/kafka/data

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_DELETE_TOPIC_ENABLE: "true"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────── Kafka Topic Init ───────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: food_delivery_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pipeline_net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo '>>> Creating Kafka topic: food_orders'
      kafka-topics --bootstrap-server kafka:9093 \
        --create --if-not-exists \
        --topic food_orders \
        --partitions 3 \
        --replication-factor 1 \
        --config retention.ms=604800000 \
        --config compression.type=lz4
      echo '>>> Topic food_orders created successfully.'
      kafka-topics --bootstrap-server kafka:9093 --list
      "
    restart: "no"

  # ─────────────────────────── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: food_delivery_postgres
    hostname: postgres
    restart: unless-stopped
    networks:
      - pipeline_net
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run SQL scripts on first container start
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ../database/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
      - ../database/seed_data.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    environment:
      POSTGRES_DB: food_delivery_db
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d food_delivery_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c wal_level=replica
        -c log_statement=none
        -c log_duration=off

  # ─────────────────────────── Kafka UI ────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: food_delivery_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pipeline_net
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: food-delivery-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    profiles:
      - tools

  # ─────────────────────────── pgAdmin ─────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: food_delivery_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline_net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@foodpipeline.dev
      PGADMIN_DEFAULT_PASSWORD: admin2024
      PGADMIN_CONFIG_SERVER_MODE: "False"
    profiles:
      - tools
